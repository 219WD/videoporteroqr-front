name: iOS EAS Build

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: "iOS build profile"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production

jobs:
  build-ios:
    environment: ${{ inputs.build_profile }}
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ vars.EXPO_TOKEN_V2 }}
      BUILD_PROFILE: ${{ inputs.build_profile }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          test -n "$EXPO_TOKEN"

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Trigger EAS iOS Build
        run: |
          npx eas-cli@latest build \
            --platform ios \
            --profile "$BUILD_PROFILE" \
            --non-interactive
