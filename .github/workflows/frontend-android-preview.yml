name: Android local build - preview

on:
  release:
    types: [published]

jobs:
  build-apk:
    if: github.event.release.prerelease == true
    environment: preview
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      EXPO_PUBLIC_BACKEND_URL: ${{ vars.EXPO_PUBLIC_BACKEND_URL }}
      EXPO_PUBLIC_SOCKET_URL: ${{ vars.EXPO_PUBLIC_SOCKET_URL }}
      GOOGLE_SERVICES_JSON_CONTENT: ${{ vars.GOOGLE_SERVICES_JSON_CONTENT }}
      EXPO_TOKEN: ${{ vars.EXPO_TOKEN }}
      EAS_LOCAL_BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate required environment variables
        run: |
          test -n "$EXPO_PUBLIC_BACKEND_URL"
          test -n "$EXPO_PUBLIC_SOCKET_URL"
          test -n "$GOOGLE_SERVICES_JSON_CONTENT"
          test -n "$EXPO_TOKEN"

      - name: Validate preview release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|preview)\.[0-9]+$ ]]; then
            echo "Invalid preview tag: $RELEASE_TAG"
            echo "Expected format: vX.Y.Z-rc.N, vX.Y.Z-beta.N or vX.Y.Z-preview.N"
            exit 1
          fi

      - name: Generate the native Android project
        run: npx expo@^54.0.25 prebuild --platform android --clean

      - name: Verify local Android build inputs
        run: |
          test -d android
          test -f android/gradlew
          test -d android/app
          test -f android/app/google-services.json

      - name: Build locally with EAS
        run: npx eas-cli@latest build --platform android --profile preview --local --non-interactive

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-local-build-preview
          path: artifacts/**
          if-no-files-found: error
          retention-days: 7
