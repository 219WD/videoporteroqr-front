name: Frontend Android Local Build

on:
  push:
    paths:
      - 'videoporteroqr-front/**'
      - '.github/workflows/frontend-android-local-build.yml'
  pull_request:
    paths:
      - 'videoporteroqr-front/**'
      - '.github/workflows/frontend-android-local-build.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: videoporteroqr-front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: videoporteroqr-front/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Verify local Android build inputs
        run: |
          test -f android/gradlew
          test -d android/app

      - name: Build APK locally
        run: ./android/gradlew assembleRelease --stacktrace

      - name: Confirm APK output
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK was generated."
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-android-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14
